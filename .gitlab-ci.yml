.deploy:
  stage: deploy
  image: registry.gitlab.com/static-web-apps/azure-static-web-apps-deploy
  variables:
    APP_PATH: '$CI_PROJECT_DIR/dist'
    SKIP_APP_BUILD: true
    SKIP_API_BUILD: true
  script:
    - echo "Deploying SWA."

deploy_staging:
  extends: .deploy
  environment:
    name: staging
  resource_group: staging
  variables:
    API_TOKEN: $AZURE_SWA_API_TOKEN_STAGING
  needs:
    - job: build_staging_artifact
      artifacts: true
    - job: test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

