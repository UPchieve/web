build_production:
  stage: build
  image: "docker:20.10.6"
  cache: {}
  variables:
    DOCKER_TLS_CERTDIR: ""
    MOUNT_POINT: /builds/$CI_PROJECT_PATH/mnt
  services:
    - docker:20.10.6-dind
  script:
    - |
      if [[ -z "$CI_COMMIT_TAG" ]]; then
        export CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG}
        export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_SHA}
      else
        export CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE}
        export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_TAG}
      fi
    - export image_tagged="$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG"
    - export image_cache="$CI_REGISTRY_IMAGE/cache-image:latest"
    - export image_latest="$CI_APPLICATION_REPOSITORY:latest"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --update curl tar
    # install buildpacks tool
    - (curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.26.0/pack-v0.26.0-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack)
    # install and configure doppler cli
    - wget -q -t3 'https://packages.doppler.com/public/cli/rsa.8004D9FF50437357.key' -O /etc/apk/keys/cli@doppler-8004D9FF50437357.rsa.pub
    - echo 'https://packages.doppler.com/public/cli/alpine/any-version/main' | tee -a /etc/apk/repositories
    - apk add doppler
    - mkdir -p "$MOUNT_POINT"
    - 'echo "{\"version\": \"$CI_COMMIT_SHA-production\"}" > public/version.json'
    # build
    # Node.js 17+ uses OpenSSL 3 which enforces stricter crypto policies, 
    # leading to errors in some crypto operations.
    # The 'openssl-legacy-provider' option allows older crypto methods for compatibility.
    # TODO: Remove the NODE_OPTIONS env when webpack is updated to v5 and there are no build issues.
    - |
      doppler run --token "$DOPPLER_TOKEN_PRODUCTION" \
      --mount "$MOUNT_POINT/.doppler_env" \
      --mount-template .doppler_env.tmpl -- \
          pack build "$image_tagged"-production \
            --env-file "$MOUNT_POINT/.doppler_env" \
            --env "VUE_APP_VERSION=$CI_COMMIT_SHA-production" \
            --env "NODE_OPTIONS=--openssl-legacy-provider" \
            --creation-time now \
            --builder heroku/buildpacks:20 \
            --buildpack registry.gitlab.com/upchieve/doppler-buildpack \
            --buildpack heroku/nodejs@2.6.2 \
            --buildpack heroku/procfile@0.6.2
    - docker push "$image_tagged"-production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

