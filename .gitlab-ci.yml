stages:
  - build
  - test
  - deploy
  - post-deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm

variables:
  AUTO_DEVOPS_BUILD_IMAGE_CNB_ENABLED: "true"
  AUTO_DEVOPS_BUILD_IMAGE_CNB_BUILDER: "heroku/buildpacks:20"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  NEW_RELIC_ENABLED: "false"
  NEW_RELIC_NO_CONFIG_FILE: "true"

.build_artifact:
  stage: build
  image: "node:20.10.0-bullseye"
  cache: []
  environment:
    action: prepare
  artifacts:
    when: on_success
    paths:
      - dist/
  allow_failure: false
  before_script:
    - npm ci
    - apt update && apt install -y curl gnupg
    - curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sh
  script:
    - 'echo "{\"version\": \"$CI_COMMIT_SHA-$CI_ENVIRONMENT_NAME\"}" > public/version.json'
    - doppler run --token $DOPPLER_TOKEN -- npm run build

build_staging_artifact:
  extends: .build_artifact
  environment:
    name: staging
  variables:
    DOPPLER_TOKEN: $DOPPLER_TOKEN_STAGING
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

# TODO: Uncomment once production environment is set up.
