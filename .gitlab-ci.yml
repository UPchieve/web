stages:
  - build
  - test
  - deploy
  - post-deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm

variables:
  # TODO: Is this variable actually ?
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

.build_artifact:
  stage: build
  image: 'node:20.10.0-bullseye'
  cache: []
  environment:
    action: prepare
  artifacts:
    when: on_success
    paths:
      - dist/
  before_script:
    - npm ci
    - apt update && apt install -y curl gnupg
    - curl -Ls --tlsv1.2 --proto "=https" --retry 3 https://cli.doppler.com/install.sh | sh
  script:
    - 'echo "{\"version\": \"$CI_COMMIT_SHA-$CI_ENVIRONMENT_NAME\"}" > public/version.json'
    - doppler run --token $DOPPLER_TOKEN -- npm run build

build_staging_artifact:
  extends: .build_artifact
  environment:
    name: staging
  variables:
    DOPPLER_TOKEN: $DOPPLER_TOKEN_STAGING
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

build_production_artifact:
  extends: .build_artifact
  environment:
    name: production
  variables:
    DOPPLER_TOKEN: $DOPPLER_TOKEN_PRODUCTION
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

.deploy:
  stage: deploy
  image: registry.gitlab.com/static-web-apps/azure-static-web-apps-deploy
  variables:
    APP_PATH: '$CI_PROJECT_DIR/dist'
    SKIP_APP_BUILD: true
    SKIP_API_BUILD: true
  script:
    - echo "Deploying SWA."

deploy_staging:
  extends: .deploy
  environment:
    name: staging
  resource_group: staging
  variables:
    API_TOKEN: $AZURE_SWA_API_TOKEN_STAGING
  needs:
    - job: build_staging_artifact
      artifacts: true
    - job: test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

deploy_production:
  extends: .deploy
  environment:
    name: production
  resource_group: production
  variables:
    API_TOKEN: $AZURE_SWA_API_TOKEN_PRODUCTION
  needs:
    - job: build_production_artifact
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.
      when: manual

tag_commit_production:
  stage: post-deploy
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: deploy_production
  script:
    - echo 'Tag commit $CI_COMMIT_SHA'
  release:
    tag_name: 'deployed-$(date +%Y-%m-%d_%H-%M-%S)'
    description: 'Deployed from GitLab CI.'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

new_relic_deploy_tracker:
  stage: post-deploy
  needs:
    - job: deploy_production
  variables:
    NEW_RELIC_DEPLOYMENT_USER_KEY: $NEW_RELIC_DEPLOYMENT_USER_KEY
    NEW_RELIC_BROWSER_GUID_PRODUCTION: $NEW_RELIC_BROWSER_GUID_PRODUCTION
  script: >
    curl -v https://api.newrelic.com/graphql
    -H 'content-type: application/json; charset=utf-8'
    -H "API-Key: $NEW_RELIC_DEPLOYMENT_USER_KEY"
    --data-raw '{"query":"mutation { changeTrackingCreateDeployment(deployment: {version: \"'$CI_COMMIT_SHA'\", entityGuid: \"'$NEW_RELIC_BROWSER_GUID_PRODUCTION'\"}) { deploymentId timestamp } }"}'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

test:
  stage: test
  image: node:20.10.0-bullseye
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

lint:
  stage: test
  image: node:20.10.0-bullseye
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint:dry
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

html_validate:
  stage: test
  image: node:20.10.0-bullseye
  allow_failure: true
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run html-validate
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.
