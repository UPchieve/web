###

test:
  stage: test
  image: node:20.10.0-bullseye
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

lint:
  stage: test
  image: node:20.10.0-bullseye
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint:dry
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.

html_validate:
  stage: test
  image: node:20.10.0-bullseye
  allow_failure: true
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run html-validate
  rules:
    - if: '$TEST_DISABLED'
      when: never
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # MR is created or updated.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Committed to main.
